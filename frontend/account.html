<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Account</title>

  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="account.css">
</head>
<body>

  <nav>
    <span class="nav-brand">
      <img src="logo.jpeg" width="60" height="60">
      <span class="nav-logo">MEDI<span>QUEUE</span></span>
    </span>

    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="clinics.html">Clinics</a></li>
      <li><a href="appointment.html">Book Appointment</a></li>
    </ul>

    <button class="nav-cta" onclick="window.location.href='account.html'">
      Account
    </button>
  </nav>

  <main class="account-container">
    <h1>My Account</h1>
    <p class="account-subtitle">Manage your profile, settings, and sessions</p>

    <section class="account-box">
      <button class="account-btn">Profile</button>
      <button class="account-btn">Settings</button>
      <button class="account-btn logout">Log Out</button>
      <button id="deleteBtn" class="account-btn delete">Delete Account</button>
    </section>

    <dialog id="deletePopup">
  <!-- Step 1 -->
  <div id="step1">
    <p><b>Warning! You are about to delete your account. This cannot be undone.</b></p>
    <button id="confirmDelete">Yes, delete</button>
    <button id="cancelDelete">Cancel</button>
  </div>

  <!-- Step 2 -->
  <div id="step2" style="display:none;">
    <p><b>Please enter your password to confirm:</b></p>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button id="finalDelete">Delete Account</button>
    <button id="backBtn">Back</button>
  </div>
</dialog>
  </main>

  <script type="module">
const deleteBtn = document.querySelector(".delete");
const popup = document.getElementById("deletePopup");

const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");

const cancelBtn = document.getElementById("cancelDelete");
const confirmDeleteBtn = document.getElementById("confirmDelete");
const finalDeleteBtn = document.getElementById("finalDelete");
const backBtn = document.getElementById("backBtn");

const passwordInput = document.getElementById("passwordInput");

// Open popup
deleteBtn.addEventListener("click", () => {
  popup.showModal();
  step1.style.display = "block";
  step2.style.display = "none";
});

// Cancel
cancelBtn.addEventListener("click", () => {
  popup.close();
});

// Go to password step
confirmDeleteBtn.addEventListener("click", () => {
  step1.style.display = "none";
  step2.style.display = "block";
});

// Go back
backBtn.addEventListener("click", () => {
  step2.style.display = "none";
  step1.style.display = "block";
});

// Final delete
finalDeleteBtn.addEventListener("click", () => {
  const password = passwordInput.value;

  if (!password) {
    alert("Please enter your password");
    return;
  }

  // 🔥 Replace this with Supabase delete logic
  console.log("Deleting account with password:", password);

  alert("Account deleted");

  // Redirect to login page
  window.location.href = "login.html";
});
  </script>
</body>
</html>
