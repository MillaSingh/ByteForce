<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Account</title>

  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="account.css">
</head>
<body>

  <nav>
    <span class="nav-brand">
      <img src="logo.jpeg" width="60" height="60">
      <span class="nav-logo">MEDI<span>QUEUE</span></span>
    </span>

    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href= "clinics.html">Clinics</a></li>
      <li><a href="appointment.html">Book Appointment</a></li>
    </ul>

    <button class="nav-cta" onclick="window.location.href='account.html'">
      Account
    </button>
  </nav>

  <main class="account-container">
    <h1>
        My Account
        <p class="account-subtitle">Manage your profile, settings, and sessions</p>
    </h1>

    <section class="account-box">
      <button class="account-btn">Profile</button>
      <button class="account-btn">Settings</button>
    </section>
  </main>

<script type="module">
  // 1. Import the real logout logic from your brain (auth.js)
  import { logOut } from './auth.js';

  // 2. Attach the event listener to the button
  const logoutBtn = document.querySelector('.logout');
  
  logoutBtn.addEventListener('click', async () => {
    try {
      // 3. Actually tell Firebase to kill the session
      await logOut();
      
      // 4. Clear any local data and go home
      sessionStorage.clear();
      window.location.href = "Login.html";
    } catch (error) {
      console.error("Logout failed:", error);
      alert("Error logging out. Please try again.");
    }
  });
</script>
  

</body>
</html>
