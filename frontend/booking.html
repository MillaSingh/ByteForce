<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediQueue | Book Appointment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="booking.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
    <figure class="logo">
        <img src="logo.png" alt="MediQueue logo">
        <figcaption class="brand">MEDIQUEUE</figcaption>
    </figure>

    <nav>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Clinics</a></li>
            <li><a href="#" aria-current="page">Book Appointment</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <button class="account-btn">Account</button>
</header>

<section class="hero">
    <p class="tag">ONLINE BOOKING</p>
    <h1>Book Your Appointment</h1>
    <p class="subtitle">Pick a time that suits you based on your clinic</p>
</section>

<main class="card">

<ol class="steps">
    <li class="active">1 Reason</li>
    <li>2 Clinic</li>
    <li>3 Time</li>
</ol>

<form>

<fieldset>
    <legend>Reason for Visit</legend>

    <ul id="reasons" class="chips">
        <li><button type="button">Check-up</button></li>
        <li><button type="button">Flu</button></li>
        <li><button type="button">Follow-up</button></li>
        <li><button type="button">Chronic</button></li>
    </ul>
</fieldset>

<fieldset>
    <legend>Select Clinic</legend>
    <select id="clinic">
        <option value="">Choose clinic</option>
        <option value="Sandton">Sandton Clinic (15 min wait)</option>
        <option value="Soweto">Soweto Clinic (30 min wait)</option>
    </select>
</fieldset>

<fieldset>
    <legend>Select Time</legend>
    <select id="time">
        <option value="">Choose time</option>
    </select>
</fieldset>

<button type="submit" class="primary-btn">Confirm Booking</button>

<output id="message"></output>

</form>

</main>

<footer>
    <small>© 2026 MediQueue — Community Clinic Booking</small>
</footer>

<script>
const slots = {
    Sandton: ["09:00","10:00","11:00"],
    Soweto: ["12:00","13:00","14:00"]
};

const clinic = document.getElementById("clinic");
const time = document.getElementById("time");

clinic.addEventListener("change", () => {
    time.innerHTML = "<option value=''>Choose time</option>";
    slots[clinic.value]?.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        time.appendChild(opt);
    });
});

let selectedReason = "";
document.querySelectorAll("#reasons button").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll("#reasons button").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedReason = btn.textContent;
    }
});

document.querySelector("form").addEventListener("submit", e => {
    e.preventDefault();
    const msg = document.getElementById("message");

    if (!selectedReason || !clinic.value || !time.value) {
        msg.textContent = "Please complete all fields";
        msg.style.color = "#e74c3c";
        return;
    }

    msg.textContent = "Appointment booked successfully!";
    msg.style.color = "#2ecc71";
});
</script>

</body>
</html>
