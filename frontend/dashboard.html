<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic Dashboard | MEDIQUEUE</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<!-- Navigation bar -->
<nav>
  <section class="nav-brand">
    <img src="logo.jpeg" width="60" height="60">
    <span class="nav-logo">MEDI<span>QUEUE</span></span>
  </section>

  <ul class="nav-links">
    <li><a href="#" class="active">Dashboard</a></li>
  </ul>

  Account
</nav>

<!-- Header -->
<header class="hero">
  <span class="hero-badge">Clinic Staff</span>
  <h1>Patient Queue Dashboard</h1>
  <p>Manage patient flow and update consultation status in real-time</p>
</header>

<main>
  <section class="card">

    <h2 class="section-title">Active Patient Queue</h2>
    <p class="section-sub">Search and manage patients</p>

    <!-- Controls -->
    <section class="controls">
      <input type="text" id="searchInput" placeholder="Search patient...">
      
      <select id="filterStatus">
        <option value="All">All Status</option>
        <option value="Waiting">Waiting</option>
        <option value="In Consultation">In Consultation</option>
        <option value="Complete">Complete</option>
      </select>
    </section>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Position</th>
          <th>Name</th>
          <th>ID</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="patientTable"></tbody>
    </table>

  </section>
</main>

<!-- Footer -->
<footer>
  © 2026 MediQueue · All rights reserved
</footer>

<script>
let patients = [];

// Load HARD-CODED data
function loadPatients() {
  patients = [
    { queue_position: 1, first_name: "John", last_name: "Doe", queue_id: 101, status: "waiting" },
    { queue_position: 2, first_name: "Sarah", last_name: "Smith", queue_id: 102, status: "in_consultation" },
    { queue_position: 3, first_name: "Michael", last_name: "Brown", queue_id: 103, status: "complete" },
    { queue_position: 4, first_name: "Aisha", last_name: "Khan", queue_id: 104, status: "waiting" },
    { queue_position: 5, first_name: "David", last_name: "Moyo", queue_id: 105, status: "in_consultation" }
  ];

  renderPatients();
}

// Render table
function renderPatients() {
  const table = document.getElementById("patientTable");
  table.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();
  const filter = document.getElementById("filterStatus").value;

  patients.forEach((patient) => {
    const fullName = patient.first_name + " " + patient.last_name;

    if (
      fullName.toLowerCase().includes(search) &&
      (filter === "All" || formatStatus(patient.status) === filter)
    ) {
      let row = `
        <tr>
          <td>${patient.queue_position}</td>
          <td>${fullName}</td>
          <td>${patient.queue_id}</td>
          <td>
            <select onchange="updateStatus(${patient.queue_id}, this.value)">
              <option ${patient.status==="waiting"?"selected":""}>Waiting</option>
              <option ${patient.status==="in_consultation"?"selected":""}>In Consultation</option>
              <option ${patient.status==="complete"?"selected":""}>Complete</option>
            </select>
          </td>
        </tr>
      `;
      table.innerHTML += row;
    }
  });
}

// Format status
function formatStatus(status) {
  if (status === "waiting") return "Waiting";
  if (status === "in_consultation") return "In Consultation";
  if (status === "complete") return "Complete";
}

// Simulate update (no backend)
function updateStatus(id, value) {
  let dbStatus = value.toLowerCase().replace(" ", "_");

  patients = patients.map(p =>
    p.queue_id === id ? { ...p, status: dbStatus } : p
  );

  renderPatients();
}

// Event listeners
document.getElementById("searchInput").addEventListener("input", renderPatients);
document.getElementById("filterStatus").addEventListener("change", renderPatients);

// Initial load
loadPatients();
</script>

</body>
</html>
