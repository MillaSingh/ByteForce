<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic Dashboard | MEDIQUEUE</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<!-- Navigation bar -->
<nav>
  <section class="nav-brand">
    <img src="logo.jpeg" width="60" height="60">
    <span class="nav-logo">MEDI<span>QUEUE</span></span>
  </section>

  <ul class="nav-links">
    <li><a href="#" class="active">Dashboard</a></li>
  </ul>

  Account
</nav>

<!-- Header -->
<header class="hero">
  <span class="hero-badge">Clinic Staff</span>
  <h1>Patient Queue Dashboard</h1>
  <p>Manage patient flow and update consultation status in real-time</p>
</header>

<main>
  <section class="card">

    <h2 class="section-title">Active Patient Queue</h2>
    <p class="section-sub">Search and manage patients</p>

    

    <!-- Controls -->
    <section class="controls">
      <input type="text" id="searchInput" placeholder="Search patient...">
      
      <select id="filterStatus">
        <option value="All">All Status</option>
        <option value="Waiting">Waiting</option>
        <option value="In Consultation">In Consultation</option>
        <option value="Complete">Complete</option>
      </select>
      <!-- ADD PATIENT BUTTON -->
      <button id="addPatientBtn">Add Patient</button>
    </section>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Position</th>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          
        </tr>
      </thead>
      <tbody id="patientTable"></tbody>
    </table>

  </section>
</main>
    <!-- Add Walk in patient  -->
  <dialog id="patientDialog">
  <h3>Add Walk-in Patient</h3>

  <input type="text" id="firstName" placeholder="First Name" required>
  <input type="text" id="lastName" placeholder="Last Name" required>
  <input type="email" id="email" placeholder="Email" required>

  <section class="dialog-buttons">
    <button onclick="submitPatient()">Add</button>
    <button onclick="closeDialog()">Cancel</button>
  </section>
  </dialog>

<!-- Footer -->
<footer>
  © 2026 MediQueue · All rights reserved
</footer>

<!-- LINK TO YOUR JS FILE -->
<script src="dashboard.js"></script>

</body>
</html>
