<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- Sets character encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes it responsive -->
  <title>Clinic Dashboard | MEDIQUEUE</title>

  <!-- Importing fonts from Google -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Link to external CSS file -->
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<!-- Navigation bar -->
<nav>
  <section class="nav-brand">
    <img src="logo.jpeg" width="60" height="60"> <!-- Logo -->
    <span class="nav-logo">MEDI<span>QUEUE</span></span> <!-- App name -->
  </section>

  <!-- Navigation links -->
  <ul class="nav-links">
    <li><a href="#" class="active">Dashboard</a></li>
  </ul>

  Account <!-- Placeholder for account section -->
</nav>

<!-- Header section -->
<header class="hero">
  <span class="hero-badge">Clinic Staff</span>
  <h1>Patient Queue Dashboard</h1>
  <p>Manage patient flow and update consultation status in real-time</p>
</header>

<main>
  <section class="card">

    <h2 class="section-title">Active Patient Queue</h2>
    <p class="section-sub">Search and manage patients</p>

    <!-- Search and filter controls -->
    <section class="controls">
      <input type="text" id="searchInput" placeholder="Search patient..."> <!-- Search box -->
      
      <select id="filterStatus"> <!-- Dropdown filter -->
        <option value="All">All Status</option>
        <option value="Waiting">Waiting</option>
        <option value="In Consultation">In Consultation</option>
        <option value="Complete">Complete</option>
      </select>
    </section>

    <!-- Table to display patients -->
    <table>
      <thead>
        <tr>
          <th>Position</th>
          <th>Name</th>
          <th>ID</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="patientTable"></tbody> <!-- Filled dynamically -->
    </table>

  </section>
</main>

<!-- Footer -->
<footer>
  © 2026 MediQueue · All rights reserved
</footer>

<script>
let patients = []; // Stores patient data

// Fetch patient data from backend
async function loadPatients() {
  try {
    const response = await fetch('/api/patients'); // API call
    patients = await response.json(); // Convert to JSON
    renderPatients(); // Display patients
  } catch (error) {
    console.error(error); // Log errors
  }
}

// Display patients in the table
function renderPatients() {
  const table = document.getElementById("patientTable");
  table.innerHTML = ""; // Clear table

  const search = document.getElementById("searchInput").value.toLowerCase(); // Get search input
  const filter = document.getElementById("filterStatus").value; // Get selected filter

  patients.forEach((patient) => {
    const fullName = patient.first_name + " " + patient.last_name; // Combine names

    // Check if patient matches search and filter
    if (
      fullName.toLowerCase().includes(search) &&
      (filter === "All" || formatStatus(patient.status) === filter)
    ) {
      // Create table row
      let row = `
        <tr>
          <td>${patient.queue_position}</td>
          <td>${fullName}</td>
          <td>${patient.queue_id}</td>
          <td>
            <!-- Dropdown to update status -->
            <select onchange="updateStatus(${patient.queue_id}, this.value)">
              <option ${patient.status==="waiting"?"selected":""}>Waiting</option>
              <option ${patient.status==="in_consultation"?"selected":""}>In Consultation</option>
              <option ${patient.status==="complete"?"selected":""}>Complete</option>
            </select>
          </td>
        </tr>
      `;
      table.innerHTML += row; // Add row to table
    }
  });
}

// Convert database status → readable text
function formatStatus(status) {
  if (status === "waiting") return "Waiting";
  if (status === "in_consultation") return "In Consultation";
  if (status === "complete") return "Complete";
}

// Send updated status to backend
async function updateStatus(id, value) {
  let dbStatus = value.toLowerCase().replace(" ", "_"); // Convert to DB format

  await fetch(`/api/patients/${id}`, {
    method: "PUT", // Update request
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ status: dbStatus }) // Send new status
  });

  loadPatients(); // Reload updated data
}

// Re-render when user types in search
document.getElementById("searchInput").addEventListener("input", renderPatients);

// Re-render when filter changes
document.getElementById("filterStatus").addEventListener("change", renderPatients);

// Initial load of patients
loadPatients();
</script>

</body>
</html>
