<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Appointments | MEDIQUEUE</title>

  <link rel="stylesheet" href="/css/myAppointments.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
</head>

<body>

  <!-- NAV -->
  <nav>
    <div class="nav-brand">
      <img src="/images/logo.jpeg" width="45" height="45">
      <div class="nav-logo">MEDI<span>QUEUE</span></div>
    </div>

    <ul class="nav-links">
      <li><a href="/html/home.html">Home</a></li>
      <li><a href="/html/clinics.html">Clinics</a></li>
      <li><a href="/html/appointment.html">Book</a></li>
      <li><a class="active" href="/html/myAppointments.html">My Appointments</a></li>
    </ul>

    <button class="nav-cta" onclick="window.location.href='/html/account.html'">
      Account
    </button>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>My Appointments</h1>
    <p>Track your medical bookings in one place</p>
  </div>

  <!-- MAIN -->
  <main>
    <div class="container-card">

      <div class="summary-header">
        <h2>Your Dashboard</h2>
        <p id="summary-text">Loading appointments...</p>
      </div>

      <div class="filters">
        <button onclick="filterAppointments('all')">All</button>
        <button onclick="filterAppointments('upcoming')">Upcoming</button>
        <button onclick="filterAppointments('past')">Past</button>
      </div>

      <div id="loading" class="center">Loading appointments...</div>

      <div id="empty" class="center" style="display:none;">
        No appointments yet 🫤
      </div>

      <div class="group">
        <h3>Upcoming</h3>
        <div id="upcoming" class="list"></div>
      </div>

      <div class="group">
        <h3>Past</h3>
        <div id="past" class="list"></div>
      </div>

    </div>
  </main>

  <script src="/html/myAppointments.html"></script>

</body>

</html>
