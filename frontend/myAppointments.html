<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Appointments</title>

  <link rel="stylesheet" href="myAppointments.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet"/>
</head>

<body>

<nav>
  <div class="nav-logo">MEDI<span>QUEUE</span></div>
</nav>

<div class="hero">
  <h1>My Appointments</h1>
  <p>Track your bookings</p>
</div>

<main>
    <div class="container-card">
  
      <div id="loading" class="center">Loading...</div>
      <div id="empty" class="center" style="display:none;">No appointments found</div>
  
      <div class="section">
        <h2>Upcoming</h2>
        <div id="upcoming" class="list"></div>
      </div>
  
      <div class="section">
        <h2>Past</h2>
        <div id="past" class="list"></div>
      </div>
  
    </div>
  </main>

<script>
async function loadAppointments() {
  const upcoming = document.getElementById("upcoming");
  const past = document.getElementById("past");
  const loading = document.getElementById("loading");
  const empty = document.getElementById("empty");

  try {
    const res = await fetch("http://localhost:3000/appointments/my");

    const data = await res.json();
    loading.style.display = "none";

    if (!data || data.length === 0) {
      empty.style.display = "block";
      return;
    }

    const now = new Date();

    data.forEach(app => {
        const card = document.createElement("div");
card.className = "appointment-card";

const date = new Date(app.appointment_date + "T" + app.appointment_time);

card.innerHTML = `
  <div class="appointment-info">
    <div class="appointment-title">${app.clinic_name || "Clinic"}</div>
    <div class="appointment-date">${date.toLocaleString()}</div>
  </div>
  <div class="status ${app.status}">${app.status}</div>
`;

      if (date >= now && app.status !== "cancelled") {
        upcoming.appendChild(card);
      } else {
        past.appendChild(card);
      }
    });

  } catch (err) {
    console.error(err);
    loading.innerText = "Error loading appointments";
  }
}

loadAppointments();
</script>

</body>
</html>
