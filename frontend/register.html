
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MEDIQUEUE</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #dobField {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 16px;
            background-color: #f9f9f9;
            color: #333;
        }
        #dobLabel {
            font-weight: 600 !important;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">
            <img src="logo.jpeg" alt="MEDIQUEUE" width="50" height="50">
            <div class="nav-logo">MEDI<span>QUEUE</span></div>
        </div>
    </nav>
    <main>
        <section id="register-card" style="background: rgb(239, 233, 233); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto;">
            <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Create Account</h2>
            <form id="registerForm">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" required>

                <label for="surname">Surname</label>
                <input type="text" id="surname" required>

                <label for="email">Email</label>
                <input type="email" id="email" required>

                <label for="idNumber">ID Number</label>
                <input type="text" id="idNumber" required maxlength="13">

                <label id="dobLabel" for="dobField">Date Of Birth</label>
                <input type="text" id="dobField" readonly>

                <label for="password">Password</label>
                <input type="password" id="password" required>

                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required>

                <label style="font-weight: normal;">
                    <input type="checkbox" id="detailsConfirmation" required> I confirm that all details provided are true and valid. Providing false information may lead to legal consequences.
                </label>

                <button type="submit">Send OTP</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Already have an account? <a href="Login.html">Login</a>
            </p>
            <div id="errorMsg" style="color: red; text-align: center; margin-top: 10px; display: none;"></div>
            <div id="successMsg" style="color: green; text-align: center; margin-top: 10px; display: none;"></div>
        </section>
    </main>

    <script type="module">
        const idInput = document.getElementById('idNumber');
        const dobField = document.getElementById('dobField');
        const registerForm = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // Initialize EmailJS
        emailjs.init('vi1AV9hQmg6Ud4qWs');

        idInput.addEventListener('input', function() {
            const idNumber = this.value.replace(/\D/g, '').slice(0,13);
            this.value = idNumber;
            if (idNumber.length === 13) {
                const yy = parseInt(idNumber.slice(0,2));
                const mm = idNumber.slice(2,4);
                const dd = idNumber.slice(4,6);
                let fullYear;
                if (yy >= 0 && yy <= 21) {
                    fullYear = 2000 + yy;
                } else {
                    fullYear = 1900 + yy;
                }
                dobField.value = `${fullYear}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
            } else {
                dobField.value = '';
            }
        });

        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const surname = document.getElementById('surname').value.trim();
            const email = document.getElementById('email').value.trim();
            const idNumber = idInput.value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const detailsConfirmed = document.getElementById('detailsConfirmation').checked;

            clearMessages();

            // Validation
            if (!firstName || !surname || !email || !idNumber || !password || !detailsConfirmed) {
                showError('Please fill all fields and confirm details.');
                return;
            }

            if (!/^\d{13}$/.test(idNumber)) {
                showError('ID must be exactly 13 digits.');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Please enter a valid email address.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            // Generate OTP and stage user data
            const otp = Math.floor(100000 + Math.random() * 900000).toString();
            const userData = {
                fullName: `${firstName} ${surname}`,
                email,
                password,
                idNumber,
                role: 'patient'
            };

            // Save to sessionStorage (staging)
            sessionStorage.setItem('pendingUser', JSON.stringify(userData));
            sessionStorage.setItem('currentOTP', otp);

            // Send OTP via EmailJS
            try {
await emailjs.send('service_3ezcsxj', 'template_8tcz8ka', {
                    passcode: otp,
                    time: new Date(Date.now() + 30 * 60 * 1000).toLocaleString()
                });

                showSuccess('OTP sent to your email! Check your inbox.');
                setTimeout(() => {
                    window.location.href = 'verify-otp.html';
                }, 1500);
            } catch (error) {
                console.error('EmailJS error:', error);
                showError('Failed to send OTP. Please try again.');
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
        }

        function clearMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }
    </script>
</body>
</html>
