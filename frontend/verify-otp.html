<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - MEDIQUEUE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .otp-input {
            width: 50px;
            height: 50px;
            border: 2px solid var(--accent);
            border-radius: 8px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            background-color: #f9f9f9;
            color: #333;
            caret-color: var(--accent);
        }
        .otp-input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
            background-color: white;
        }
        .otp-input.error {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.2);
            background-color: #fff5f5;
        }
        .otp-input.error:focus {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.3);
        }
        .otp-input::-webkit-outer-spin-button,
        .otp-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .otp-input {
            -moz-appearance: textfield;
        }
        #emailDisplay {
            background: #e8f4f8;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 16px;
            color: #333;
        }
        .countdown {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">
            <img src="logo.jpeg" alt="MEDIQUEUE" width="50" height="50">
            <div class="nav-logo">MEDI<span>QUEUE</span></div>
        </div>
    </nav>
    <main>
        <section id="verify-card" style="background: rgb(239, 233, 233); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto;">
            <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Verify Email</h2>
            <div id="emailDisplay"></div>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">Enter the 6-digit OTP sent to your email</p>
            <form id="verifyForm">
                <label>OTP Code</label>
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                </div>

                <button type="submit">Verify</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                <a href="register.html" id="backLink" style="color: var(--accent);">← Back to Register</a>
            </p>
            <div id="errorMsg" style="color: red; text-align: center; margin-top: 10px; display: none;"></div>
            <div id="countdown" class="countdown" style="display: none;"></div>
        </section>
    </main>

    <script>
        let tempOtpData = JSON.parse(localStorage.getItem('tempOtpData'));
        if (!tempOtpData) {
            alert('No verification session found. Please register again.');
            window.location.href = 'register.html';
            throw new Error('No temp data');
        }

        document.getElementById('emailDisplay').textContent = `We've sent a code to: ${tempOtpData.email}`;
        const expiry = new Date(tempOtpData.expiry);

        function updateCountdown() {
            const now = new Date().getTime();
            const timeLeft = expiry - now;
            if (timeLeft <= 0) {
                document.getElementById('countdown').textContent = 'OTP expired. Please register again.';
                document.getElementById('verifyForm').style.display = 'none';
                return;
            }
            const minutes = Math.floor(timeLeft / 60000);
            const seconds = Math.floor((timeLeft % 60000) / 1000);
            document.getElementById('countdown').textContent = `Resend in ${minutes}m ${seconds}s`;
            setTimeout(updateCountdown, 1000);
        }

        updateCountdown();
        document.getElementById('countdown').style.display = 'block';

        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs[0].focus();

        function clearErrorStyles() {
            otpInputs.forEach(input => input.classList.remove('error'));
        }

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function(e) {
                // Only allow digits
                let val = this.value;
                val = val.replace(/[^0-9]/g, '');
                if (val.length > 1) val = val.slice(0,1);
                this.value = val;

                if (this.value.length === 1 && index < 5) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keypress', function(e) {
                // Block non-digit keypress
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                    this.classList.add('error');
                    setTimeout(() => this.classList.remove('error'), 500);
                }
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                Array.from(pastedData).forEach((digit, i) => {
                    if (otpInputs[i]) {
                        otpInputs[i].value = digit;
                    }
                });
                const nextIndex = Math.min(pastedData.length, 6);
                otpInputs[nextIndex - 1 || 0].focus();
            });
        });

        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            clearErrorStyles();
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            const errorMsg = document.getElementById('errorMsg');

            if (!/^\d{6}$/.test(otp)) {
                errorMsg.textContent = 'Please enter a valid 6-digit OTP.';
                errorMsg.style.display = 'block';
                otpInputs.forEach(input => input.classList.add('error'));
                otpInputs[0].focus();
                return;
            }

            if (otp !== tempOtpData.otp) {
                errorMsg.textContent = 'Invalid OTP. Please try again.';
                errorMsg.style.display = 'block';
                otpInputs.forEach(input => input.classList.add('error'));
                otpInputs[0].focus();
                return;
            }

            const expiryTime = new Date(tempOtpData.expiry).getTime();
            if (Date.now() > expiryTime) {
                errorMsg.textContent = 'OTP has expired. Please register again.';
                errorMsg.style.display = 'block';
                otpInputs.forEach(input => input.classList.add('error'));
                return;
            }

            // Success: complete registration
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            const newUser = {
                firstName: tempOtpData.firstName,
                surname: tempOtpData.surname,
                email: tempOtpData.email,
                idNumber: tempOtpData.idNumber,
                password: tempOtpData.password,
                role: 'patient'
            };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.removeItem('tempOtpData');

            alert('Email verified! Registration successful.');
            window.location.href = 'Login.html';
        });
    </script>
</body>
</html>
