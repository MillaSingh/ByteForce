
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - MEDIQUEUE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .otp-input {
            width: 50px;
            height: 50px;
            border: 2px solid var(--accent);
            border-radius: 8px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            background-color: #f9f9f9;
            color: #333;
            caret-color: var(--accent);
        }
        .otp-input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
            background-color: white;
        }
        .otp-input.error {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.2);
            background-color: #fff5f5;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .otp-input.error:focus {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.3);
        }
        .otp-input {
            -moz-appearance: textfield;
        }
        #emailDisplay {
            background: #e8f4f8;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 16px;
            color: #333;
        }
        .countdown {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">
            <img src="logo.jpeg" alt="MEDIQUEUE" width="50" height="50">
            <div class="nav-logo">MEDI<span>QUEUE</span></div>
        </div>
    </nav>
    <main>
        <section id="verify-card" style="background: rgb(239, 233, 233); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto;">
            <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Verify Email</h2>
            <div id="emailDisplay"></div>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">Enter the 6-digit OTP sent to your email</p>
            <form id="verifyForm">
                <label>OTP Code</label>
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                    <input type="text" class="otp-input" maxlength="1" autocomplete="one-time-code" />
                </div>

                <button type="submit">Verify & Complete Registration</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                <a href="register.html" id="backLink" style="color: var(--accent);">← Back to Register</a>
            </p>
            <div id="errorMsg" style="color: red; text-align: center; margin-top: 10px; display: none;"></div>
            <div id="successMsg" style="color: green; text-align: center; margin-top: 10px; display: none;"></div>
            <div id="countdown" class="countdown" style="display: none;"></div>
        </section>
    </main>

    <script type="module">
        import { signUp } from './auth.js';

        // Check for pending user data
        const pendingUserStr = sessionStorage.getItem('pendingUser');
        const currentOTP = sessionStorage.getItem('currentOTP');
        if (!pendingUserStr || !currentOTP) {
            alert('No verification session found. Please register again.');
            window.location.href = 'register.html';
        }

        const pendingUser = JSON.parse(pendingUserStr);
        document.getElementById('emailDisplay').textContent = `We've sent a code to: ${pendingUser.email}`;

        // 30-minute expiry countdown
        const expiryTime = Date.now() + 30 * 60 * 1000;
        function updateCountdown() {
            const timeLeft = expiryTime - Date.now();
            if (timeLeft <= 0) {
                document.getElementById('countdown').innerHTML = '<strong>Session expired. Please register again.</strong>';
                document.getElementById('verifyForm').style.display = 'none';
                return;
            }
            const minutes = Math.floor(timeLeft / 60000);
            const seconds = Math.floor((timeLeft % 60000) / 1000);
            document.getElementById('countdown').textContent = `Time remaining: ${minutes}m ${seconds}s`;
            setTimeout(updateCountdown, 1000);
        }
        updateCountdown();
        document.getElementById('countdown').style.display = 'block';

        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs[0].focus();

        function clearErrorStyles() {
            otpInputs.forEach(input => input.classList.remove('error'));
        }

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                let val = this.value.replace(/[^0-9]/g, '');
                if (val.length > 1) val = val.slice(0,1);
                this.value = val;

                if (this.value && index < 5) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pasted = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0,6);
                Array.from(pasted).forEach((digit, i) => {
                    if (otpInputs[i]) otpInputs[i].value = digit;
                });
                if (pasted.length) otpInputs[Math.min(pasted.length, 6)-1].focus();
            });
        });

        document.getElementById('verifyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrorStyles();

            const enteredOtp = Array.from(otpInputs).map(i => i.value).join('');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            if (!/^\d{6}$/.test(enteredOtp)) {
                errorMsg.textContent = 'Please enter valid 6-digit OTP';
                errorMsg.style.display = 'block';
                otpInputs.forEach(i => i.classList.add('error'));
                otpInputs[0].focus();
                return;
            }

            if (enteredOtp !== currentOTP) {
                errorMsg.textContent = 'Invalid OTP code!';
                errorMsg.style.display = 'block';
                otpInputs.forEach(i => i.classList.add('error'));
                otpInputs[0].focus();
                return;
            }

            // OTP verified! Complete Firebase registration
            try {
                await signUp(pendingUser.fullName, pendingUser.email, pendingUser.password, {
                    idNumber: pendingUser.idNumber,
                    role: pendingUser.role
                });

                // Success cleanup
                sessionStorage.clear();
                successMsg.textContent = 'Email verified! Registration complete. Redirecting...';
                successMsg.style.display = 'block';
                errorMsg.style.display = 'none';

                setTimeout(() => {
                    window.location.href = 'Login.html';
                }, 1500);
            } catch (error) {
                errorMsg.textContent = 'Firebase registration failed: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
